<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>How Much Did I Spend</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.plaid.com/link/v2/stable/link-initialize.js"></script>
</head>
<body>

    <!-- ========== WELCOME ========== -->
    <div id="welcome" class="screen active">
        <div class="welcome-wrap">
            <div class="welcome-top">
                <p class="welcome-pre">how much did i spend on</p>
                <div class="rotating-emoji" id="rotatingEmoji">🐶</div>
                <div class="rotating-wrap">
                    <span class="rotating-word" id="rotatingWord">dog</span><span class="dot-com">.com</span>
                </div>
            </div>
            <div class="welcome-bottom">
                <button class="btn-main" onclick="startPlaidLink()">connect your bank</button>
                <p class="welcome-fine">read-only via plaid · we never store credentials</p>
            </div>
        </div>
    </div>

    <!-- ========== CATEGORY PICKER ========== -->
    <div id="picker" class="screen">
        <div class="picker-header">
            <span></span>
            <button class="btn-text-danger" onclick="doLogout()">logout</button>
        </div>
        <div class="picker-wrap">
            <p class="picker-pre">how much did i spend on</p>
            <div class="carousel-area" id="carouselArea" onclick="selectCarousel()">
                <div class="carousel-emoji" id="carouselEmoji">🐶</div>
                <div class="carousel-word" id="carouselWord">dog<span class="carousel-dot">.com</span></div>
                <p class="carousel-hint" id="carouselHint">tap to select</p>
            </div>
            <div class="picker-divider">
                <span class="picker-or">or</span>
            </div>
            <div class="picker-custom">
                <input type="text" id="customCategory" class="picker-input" placeholder="type anything...">
                <button class="btn-go" onclick="analyzeCustom()">go →</button>
            </div>
        </div>
    </div>

    <!-- ========== LOADING ========== -->
    <div id="loading" class="screen">
        <div class="loading-wrap">
            <div class="loading-word" id="loadingWord">dog.com</div>
            <div class="progress-wrap">
                <div class="progress-bar" id="progressBar"></div>
            </div>
            <p class="loading-msg" id="loadingMsg">sniffing your transactions...</p>
        </div>
    </div>

    <!-- ========== RESULTS ========== -->
    <div id="results" class="screen">
        <div class="results-header">
            <button class="btn-back" onclick="goBack()">← back</button>
            <button class="btn-text-danger" onclick="doLogout()">logout</button>
        </div>

        <div class="results-body">
            <p class="results-pre">you spent</p>

            <div class="results-stack">
                <div class="result-row row-30">
                    <span class="row-amount" id="amt30">$0</span>
                    <span class="row-label">last 30 days</span>
                </div>
                <div class="result-row row-90">
                    <span class="row-amount" id="amt90">$0</span>
                    <span class="row-label">last 90 days</span>
                </div>
                <div class="result-row row-1yr">
                    <span class="row-amount" id="amt1yr">$0</span>
                    <span class="row-label">last year</span>
                </div>
            </div>

            <p class="results-on" id="resultsOn">on dog.com</p>
            <p class="results-meta" id="resultsMeta"></p>

            <!-- Expandable categories -->
            <div class="txn-sections" id="txnSections"></div>

            <button class="btn-secondary" onclick="goBack()" style="margin-top:20px;">ask something else</button>
        </div>
    </div>

    <div id="errorBox" class="error-toast"></div>
    <script>window.SUBDOMAIN_CATEGORY = {{ subdomain_category|tojson }};</script>
    <script src="/static/app.js"></script>
</body>
</html>
